<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 1. INCOLLA QUI I TUOI DATI DI CONFIGURAZIONE FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyAXFqZUNLWXtmA8y6OUY-_T2G7pmEgHabg",
  authDomain: "rooms-2ff73.firebaseapp.com",
  projectId: "rooms-2ff73",
  storageBucket: "rooms-2ff73.firebasestorage.app",
  messagingSenderId: "955413485941",
  appId: "1:955413485941:web:e878ea05b066dd78bd9b3c",
  measurementId: "G-NSGBDTEJNQ"
  };

  // Inizializzazione
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'assenze');

  // I tuoi dati statici (rimangono invariati)
  const studenti = [
    { cognome: "EDUCATORI", nome: "", classe: "", room:"112" },
    { cognome: "MARGUERETTAZ", nome: "Greta", classe: "5B", gruppo: "G2", room:"221" },
    { cognome: "MILLERY", nome: "Mathieu", classe: "5B", gruppo: "G2", room:"124" },
    { cognome: "RABAGLIO", nome: "Filippo", classe: "5B", gruppo: "G1", room:"119" }
    // ... aggiungi tutti gli altri qui
  ];

  let assentiGlobali = [];
  let clickCount = 0;
  let clickTimer = null;

  // 2. SINCRONIZZAZIONE IN TEMPO REALE
  // Ogni volta che il database cambia, la griglia si aggiorna su TUTTI i tablet
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    assentiGlobali = data || [];
    generaGriglia();
  });

  // 3. LOGICA doppio CLICK E INVIO DATI
  window.handleTouch = function(id) {
    clickCount++;
    if (clickTimer) clearTimeout(clickTimer);

    if (clickCount === 2) {
      toggleAssente(id);
      clickCount = 0;
    } else {
      clickTimer = setTimeout(() => { clickCount = 0; }, 500);
    }
  }

  function toggleAssente(id) {
    let nuoveAssenze = [...assentiGlobali];
    if (nuoveAssenze.includes(id)) {
      nuoveAssenze = nuoveAssenze.filter(x => x !== id);
    } else {
      nuoveAssenze.push(id);
    }
    // Salvataggio su Firebase (non più localStorage!)
    set(dbRef, nuoveAssenze);
  }

  window.resetAssenze = function() {
    if(confirm("Vuoi resettare tutte le assenze per TUTTI i dispositivi?")) {
      set(dbRef, []);
    }
  }

  function generaGriglia() {
    const grid = document.getElementById("mainGrid");
    grid.innerHTML = "";
    const stanze = {};

    studenti.forEach(s => {
      if (!stanze[s.room]) stanze[s.room] = [];
      stanze[s.room].push(s);
    });

    const numeriStanze = Object.keys(stanze).sort((a,b) => parseInt(a) - parseInt(b));
    let piano = "";

    numeriStanze.forEach(num => {
      const r = parseInt(num);
      if (r >= 100 && r < 200 && piano !== "M") {
        grid.innerHTML += `<div class="section-title">PIANO 1 - MASCHILE</div>`;
        piano = "M";
      }
      if (r >= 200 && piano !== "F") {
        grid.innerHTML += `<div class="section-title">PIANO 2 - FEMMINILE</div>`;
        piano = "F";
      }

      const box = document.createElement("div");
      box.className = "room-box";

      let occupantiHtml = stanze[num].map(s => {
        const id = `${s.cognome}_${s.nome}_${num}`;
        const isAssente = assentiGlobali.includes(id);
        
        return `
          <div class="row-student ${isAssente ? 'assente' : ''}" onclick="handleTouch('${id}')">
            <span class="student-name"><b>${s.cognome}</b> ${s.nome}</span>
            <span class="student-details">${s.classe}${s.gruppo ? ' ['+s.gruppo+']' : ''}</span>
          </div>`;
      }).join("");

      box.innerHTML = `<div class="room-info">${num}</div><div class="occupants-list">${occupantiHtml}</div>`;
      grid.appendChild(box);
    });
  }
</script>
