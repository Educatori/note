         :root {
            --bg-header: #5a8fc4;
            --accent-color: #2c3e50;
            --row-alt: #f9f9f9;
        }

       /* RESET - Permette lo scroll a video */
        html, body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100%; /* Essenziale per il riempimento verticale */
        }

        body { 
            display: flex; 
            flex-direction: column; 
            padding: 10px 15px;
            box-sizing: border-box;
        }

        .header-main {
            text-align: center;
            border-bottom: 1.5px solid var(--bg-header);
            margin-bottom: 8px;
            padding-bottom: 4px;
            flex-shrink: 0;
        }

        h1 { margin: 0; font-size: 16px; text-transform: uppercase; color: #2c3e50; }

        /* Container principale che si adatta all'altezza rimasta */
        .grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 20px;
            flex-grow: 1; 
            overflow: hidden; /* Evita che le righe escano dal foglio */
            min-height: 0;
        }

        .macro-column {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .column-header {
            display: flex;
            background: var(--bg-header);
            color: white;
            font-weight: bold;
            padding: 4px 6px;
            flex-shrink: 0;
            text-align: center;
            font-size: 9px;
        }
        
        .column-header > div {
            display: flex;
            justify-content: center; /* Centra orizzontalmente */
            align-items: center;     /* Centra verticalmente */
        }

        /* Le colonne dei dati si spartiscono lo spazio verticale */
        .col-data {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between; /* Distribuisce le righe */
        }

        .student-row { 
            border-bottom: 0.1px solid #ddd; 
            display: flex; 
            align-items: center;
            flex-grow: 1; /* Le righe si allungano/accorciano per riempire il foglio */
            min-height: 0;
            padding: 0 5px;
            font-size: 9.5px;
        }

        .student-row:nth-child(even) { background-color: var(--row-alt); }

        .row-crossed { text-decoration: line-through; opacity: 0.4; background-color: #ffebee !important; }

        /* Celle */
        .cell-room { width: 30px; font-weight: bold; text-align: center;  border-right: 1px solid #eee; }
        .cell-class { width: 30px; text-align: center; border-right: 1px solid #eee; font-size: 9px; flex-shrink: 0; }
        .cell-name { flex-grow: 1; padding-left: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cell-notes { width: 65px; border-left: 0.5px solid #eee; height: 100%; display: flex; align-items: flex-end; }
        .line-notes { width: 85%; border-bottom: 0.5px solid #bbb; margin: 0 auto 4px; }
        .no-print { position: fixed; top: 10px; right: 10px; z-index: 100; }
        .btn { padding: 8px 20px; background: #3c8740;  color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }

        @media print {
            .no-print { display: none; }
            @page { size: A4 portrait; margin: 0.5cm; }
            body { padding: 0; }
            .student-row { -webkit-print-color-adjust: exact; }
        }
    </style>

function generaGriglia() {
    const listaFinale = studentiRaw
        .filter(s => s && s.cognome)
        .sort((a, b) => a.cognome.localeCompare(b.cognome));

    const itemsPerCol = Math.ceil(listaFinale.length / 2);

  listaFinale.forEach((s, index) => {
        const colIndex = Math.floor(index / itemsPerCol);
        const colTarget = document.getElementById('col' + colIndex);

        const row = document.createElement('div');
        row.className = `student-row`;
        row.innerHTML = `
            <div class="cell-room">${s.room}</div>
            <div class="cell-class">${s.classe}</div>
            <div class="cell-name" onclick="this.parentElement.classList.toggle('row-crossed')">
                <b>${s.cognome}</b> ${s.nome}
            </div>
            <div class="cell-notes"><div class="line-notes"></div></div>
            <div class="cell-notes"><div class="line-notes"></div></div>
        `;
        colTarget.appendChild(row);
    });
}
