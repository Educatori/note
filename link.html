<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Rapidi</title>
    <style>
        :root {
            --bg-page: #eef2f7; 
            --bg-header: #1a3a5a; 
            --accent-color: #2c3e50;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--bg-header);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 24px;
            border-bottom: 3px solid var(--bg-header);
            padding-bottom: 10px;
        }

        /* Griglia delle Emoji */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 colonne su desktop */
            gap: 20px;
            max-width: 800px;
            padding: 20px;
        }

        .link-card {
            background: var(--white);
            border: 1px solid #d1d9e0;
            border-radius: 15px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(26, 58, 90, 0.2);
            background-color: #f8f9fa;
            border-color: var(--bg-header);
        }

        /* Responsive per cellulari */
        @media (max-width: 600px) {
            .links-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 colonne su schermi piccoli */
            }
            .link-card {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>link Rapidi</h1>
</div>

<div class="links-grid">
<a href="https://educatori.github.io/note/dashboard.html" class="link-card" title="Dashboard">🖥️</a>    
<a href="https://educatori.github.io/note/roomcloud.html" class="link-card" title="Cloud">☁️</a>    
<a href="https://educatori.github.io/note/buslist.html" class="link-card" title="Bus">🚌</a>
<a href="https://educatori.github.io/note/uscita.html" class="link-card" title="Uscita">📋</a>
    
    
<a href="https://educatori.github.io/note/rooming.html" class="link-card" title="Rooming">🛌</a>
<a href="https://educatori.github.io/note/dinner.html" class="link-card" title="Dinner">🍽️</a>
<a href="https://educatori.github.io/note/convitto.html" class="link-card" title="Convitto">🏠</a>
    
<a href="#" class="link-card" title="Link 8">📂</a>
<a href="#" class="link-card" title="Link 9">📍</a>
<a href="#" class="link-card" title="Link 10">🔍</a>
</div>

</body>
</html>
