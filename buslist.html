    <style>
        :root {
            --bg-header: #5a8fc4;
            --accent-color: #2c3e50;
        }

    /* Stile per la spunta nella checkbox */
        .check-box.checked::after {
    content: '✔';
    display: block;
    text-align: center;
    line-height: 12px;
    font-size: 10px;
    color: #2e7d32;
        }    
        
      
        
     /* Sfondi per la 5B */
        .bg-5b-g1 { background-color: #e8e8e8 !important; } /* Grigio molto chiaro */
        .bg-5b-g2 { background-color: #f9f9f9 !important; } /* Grigio ancora più chiaro */    
        
        
        /* Classe per barrare l'intera riga */
        .row-crossed {
    text-decoration: line-through;
    opacity: 0.6;
    background-color: #ffebee !important; /* Opzionale: un rossastro leggero per capire che è annullato */
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
            font-size: 10px;
            background-color: #fff;
        }

        .header-main {
            text-align: center;
            border-bottom: 2px solid var(--bg-header);
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        h1 { 
            margin: 0; 
            font-size: 18px; 
            text-transform: uppercase; 
            color: var(--accent-color);
        }

        /* Container per le 3 macro-colonne */
        .grid-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 20px;
        }

        /* Intestazione delle colonne all'interno di ogni macro-colonna */
        .column-header {
            display: flex;
            background: var(--bg-header);
            color: white;
            font-weight: bold;
            padding: 4px;
            border-radius: 3px 3px 0 0;
            text-transform: none;
            font-size: 8px;
            margin-bottom: 2px;
        }

      
        
        .student-row { 
            border: 0.5px solid #bbb; 
            display: flex; 
            align-items: center;
            padding: 3px 5px;
            margin-bottom: 1px;
        }

        /* Dimensionamento celle */
        .cell-room { width: 30px; font-weight: bold; border-right: 1px solid #eee; }
        .cell-name { flex-grow: 1; padding-left: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cell-class { width: 45px; text-align: center; font-size: 8.5px; }
        .cell-check { width: 40px; text-align: center; font-weight: bold; }
        .cell-notes { width: 60px; text-align: center; font-weight: bold; }

        .check-box {
            width: 12px;
            height: 12px;
            border: 1px solid #333;
            margin: 0 auto;
        }

        .line-notes {
            width: 90%;
            border-bottom: 0.5px solid #999;
            height: 12px;
            margin: 0 auto;
        }

        .no-print { text-align: center; margin-bottom: 15px; }
        .btn { 
            padding: 10px 30px; 
            background: var(--bg-header); 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold;
        }

        @media print {
            .no-print { display: none; }
            @page { 
                size: A4 landscape; 
                margin: 0.8cm; 
            }
            body { padding: 0; }
        }
    </style>
</head>

function generaGriglia() {
   
    const validi = studentiRaw.filter(s => s && s.cognome);
    
    const resto = validi.filter(s => s.classe !== "5B");
    const classe5B = validi.filter(s => s.classe === "5B");

    resto.sort((a, b) => a.cognome.localeCompare(b.cognome));
    classe5B.sort((a, b) => {
        const gA = a.gruppo || "";
        const gB = b.gruppo || "";
        return (gA + a.cognome).localeCompare(gB + b.cognome);
    });

    const listaFinale = [...resto, ...classe5B];
    const itemsPerCol = Math.ceil(listaFinale.length / 3);

    listaFinale.forEach((s, index) => {
        const colIndex = Math.floor(index / itemsPerCol);
        const colTarget = document.getElementById('col' + colIndex);
        const infoClasse = `${s.classe}${s.gruppo ? ' ' + s.gruppo : ''}`;
        
        let bgClass = "";
        if (s.classe === "5B") {
            if (s.gruppo === "G1") bgClass = "bg-5b-g1";
            if (s.gruppo === "G2") bgClass = "bg-5b-g2";
        }

        const row = document.createElement('div');
        row.className = `student-row ${bgClass}`;
        row.innerHTML = `
            <div class="cell-room">${s.room}</div>
            <div class="cell-name" style="cursor:pointer"><b>${s.cognome}</b> ${s.nome}</div>
            <div class="cell-class">${infoClasse}</div>
            <div class="cell-check"><div class="check-box" style="cursor:pointer"></div></div>
            <div class="cell-notes"><div class="line-notes"></div></div>
        `;

        // GESTIONE CLICK
        const nameCell = row.querySelector('.cell-name');
        const checkBox = row.querySelector('.check-box');

        // 1. Clic sul cognome/nome -> Barra tutta la riga
        nameCell.addEventListener('click', () => {
            row.classList.toggle('row-crossed');
        });

        // 2. Clic sul quadratino -> Mette/toglie la spunta
        checkBox.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita di attivare il click della riga se presente
            checkBox.classList.toggle('checked');
        });

        colTarget.appendChild(row);
    });
}
    

window.onload = generaGriglia;
